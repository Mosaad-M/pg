[package]
name = "pg"
version = "1.2.0"
description = "Pure-Mojo PostgreSQL client (wire protocol v3, TLS support, no libpq)"
license = "MIT"
platforms = ["linux-64", "osx-arm64"]

[mojo]
requires = ">=0.26.2"

[dependencies]
tcp = { git = "Mosaad-M/tcp", version = ">=1.0.3" }
tls = { git = "Mosaad-M/tls", version = ">=1.0.2" }
